name: CI

on:
  push:
    branches: [main, v1.0.*]
  pull_request:
    branches: [main, v1.0.*]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ubuntu-build:
    runs-on: ubuntu-latest
    env:
      COMMON_CTEST_ARGS: --no-compress-output --output-on-failure

    steps:
    - uses: actions/checkout@v6
      with:
        path: src
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install libudev-dev libumockdev-dev ninja-build pkg-config umockdev
    - name: Configure
      run: |
        rm -rf build install
        cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
        cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
        cmake -B build/no-pkgconfig -S src -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install/no-pkgconfig -DLIBUSB_BUILD_SHARED_LIBS=OFF -DLIBUSB_INSTALL_PKGCONFIG=OFF
        cmake -B build/no-cmake-package -S src -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install/no-cmake-package -DLIBUSB_BUILD_SHARED_LIBS=OFF -DLIBUSB_EXPORT_INSTALL_TARGETS=OFF
    - name: Build Shared
      working-directory: build/shared
      run: ninja install
    - name: Build Static
      working-directory: build/static
      run: ninja install
    - name: Build without pkg-config metadata
      working-directory: build/no-pkgconfig
      run: ninja install
    - name: Build without CMake package metadata
      working-directory: build/no-cmake-package
      run: ninja install
    - name: Check artifacts
      uses: andstor/file-existence-action@v3
      with:
        files: "install/shared/lib/libusb-1.0.so, \
                install/shared/include/libusb-1.0/libusb.h, \
                install/shared/lib/cmake/libusb/libusb-config.cmake, \
                install/shared/lib/cmake/libusb/libusb-config-version.cmake, \
                install/shared/lib/cmake/libusb/libusb-targets.cmake, \
                install/shared/lib/cmake/libusb/usb-1.0-targets.cmake, \
                install/shared/lib/pkgconfig/libusb-1.0.pc, \
                install/static/lib/libusb-1.0.a, \
                install/static/include/libusb-1.0/libusb.h, \
                install/static/lib/cmake/libusb/libusb-config.cmake, \
                install/static/lib/cmake/libusb/libusb-config-version.cmake, \
                install/static/lib/cmake/libusb/libusb-targets.cmake, \
                install/static/lib/cmake/libusb/usb-1.0-targets.cmake, \
                install/static/lib/pkgconfig/libusb-1.0.pc"
        fail: true
    - name: Check metadata install options are independent
      run: |
        test -f install/no-pkgconfig/lib/libusb-1.0.a
        test -f install/no-pkgconfig/include/libusb-1.0/libusb.h
        test -f install/no-pkgconfig/lib/cmake/libusb/libusb-config.cmake
        test ! -e install/no-pkgconfig/lib/pkgconfig/libusb-1.0.pc
        test -f install/no-cmake-package/lib/libusb-1.0.a
        test -f install/no-cmake-package/include/libusb-1.0/libusb.h
        test -f install/no-cmake-package/lib/pkgconfig/libusb-1.0.pc
        test ! -e install/no-cmake-package/lib/cmake/libusb
    - name: Test pkg-config packages
      run: |
        shared_pc="$PWD/install/shared/lib/pkgconfig"
        shared_version="$(PKG_CONFIG_LIBDIR="$shared_pc" pkg-config --modversion libusb-1.0)"
        PKG_CONFIG_LIBDIR="$shared_pc" pkg-config --validate libusb-1.0
        cc src/tests/package/main.c -o build/pkgconfig-shared \
          $(PKG_CONFIG_LIBDIR="$shared_pc" pkg-config --cflags --libs libusb-1.0)
        shared_runtime="$(LD_LIBRARY_PATH="$PWD/install/shared/lib" build/pkgconfig-shared)"
        test "$shared_runtime" = "$shared_version"

        static_pc="$PWD/install/static/lib/pkgconfig"
        static_version="$(PKG_CONFIG_LIBDIR="$static_pc" pkg-config --modversion libusb-1.0)"
        PKG_CONFIG_LIBDIR="$static_pc" pkg-config --validate libusb-1.0
        cc src/tests/package/main.c -o build/pkgconfig-static \
          $(PKG_CONFIG_LIBDIR="$static_pc" pkg-config --cflags --libs --static libusb-1.0)
        static_runtime="$(build/pkgconfig-static)"
        test "$static_runtime" = "$static_version"
    - name: Test Shared
      if: always()
      working-directory: build/shared
      run: ctest --output-junit test_shared.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Test Static
      if: always()
      working-directory: build/static
      run: ctest --output-junit test_static.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Test Results Ubuntu
        path: |
          build/shared/test_shared.xml
          build/static/test_static.xml


  macos-build:
    runs-on: macos-latest
    env:
      COMMON_CTEST_ARGS: --no-compress-output --output-on-failure

    steps:
    - uses: actions/checkout@v6
      with:
        path: src
    - name: Install dependencies
      run: brew install ninja
    - name: Configure
      run: |
        rm -rf build install
        cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
        cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
    - name: Build Shared
      working-directory: build/shared
      run: ninja install
    - name: Build Static
      working-directory: build/static
      run: ninja install
    - name: Check artifacts
      uses: andstor/file-existence-action@v3
      with:
        files: "install/shared/lib/libusb-1.0.dylib, \
                install/shared/include/libusb-1.0/libusb.h, \
                install/static/lib/libusb-1.0.a, \
                install/static/include/libusb-1.0/libusb.h"
        fail: true
    - name: Test Shared
      if: always()
      working-directory: build/shared
      run: ctest --output-junit test_shared.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Test Static
      if: always()
      working-directory: build/static
      run: ctest --output-junit test_static.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Test Results macOS
        path: |
          build/shared/test_shared.xml
          build/static/test_static.xml

  windows-cygwin-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: D:\cygwin\bin\bash.exe --noprofile --norc -o igncr -eo pipefail '{0}'
    env:
      COMMON_CTEST_ARGS: --no-compress-output --output-on-failure

    steps:
      - name: Configure Git line endings
        shell: cmd
        run: git config --global core.autocrlf input
      - uses: actions/checkout@v6
        with:
          path: src
      - name: Set Cygwin package cache key
        id: cygwin-cache-key
        shell: bash
        run: |
          days_since_monday=$(($(date -u +%u) - 1))
          week_start=$(date -u --date="$days_since_monday days ago" +%F)
          echo "suffix=$week_start" >> "$GITHUB_OUTPUT"
      - name: Cache Cygwin packages
        uses: actions/cache@v5
        with:
          path: 'D:\cygwin-packages'
          key: cygwin-packages-v1-${{ runner.os }}-${{ steps.cygwin-cache-key.outputs.suffix }}
      - name: Install dependencies
        uses: cygwin/cygwin-install-action@v6
        with:
          work-vol: 'D:'
          packages: cmake gcc-core ninja
      - name: Configure
        run: |
          rm -rf build install
          cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
          cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
      - name: Build Shared
        working-directory: build/shared
        run: ninja install
      - name: Build Static
        working-directory: build/static
        run: ninja install
      - name: Check artifacts
        uses: andstor/file-existence-action@v3
        with:
          files: "install/shared/lib/libusb-1.0.dll.a, \
                  install/shared/bin/libusb-1.0.dll, \
                  install/shared/include/libusb-1.0/libusb.h, \
                  install/static/lib/libusb-1.0.a, \
                  install/static/include/libusb-1.0/libusb.h"
          fail: true
      - name: Test Shared
        if: always()
        working-directory: build/shared
        run: |
          export PATH="$(pwd)/../../install/shared/bin:$PATH"
          ctest --output-junit test_shared.xml ${{ env.COMMON_CTEST_ARGS }}
      - name: Test Static
        if: always()
        working-directory: build/static
        run: ctest --output-junit test_static.xml ${{ env.COMMON_CTEST_ARGS }}
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Test Results Cygwin
          path: |
            build/shared/test_shared.xml
            build/static/test_static.xml

  windows-mingw-build:
    runs-on: windows-latest
    defaults:
      run:
        shell: 'msys2 {0}'
    env:
      COMMON_CTEST_ARGS: --no-compress-output --output-on-failure

    steps:
      - uses: actions/checkout@v6
        with:
          path: src
      - name: Install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja mingw-w64-x86_64-toolchain
      - name: Configure
        run: |
          rm -rf build install
          cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
          cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
      - name: Build Shared
        working-directory: build/shared
        run: ninja install
      - name: Build Static
        working-directory: build/static
        run: ninja install
      - name: Check artifacts
        uses: andstor/file-existence-action@v3
        with:
          files: "install/shared/lib/libusb-1.0.dll.a, \
                  install/shared/bin/libusb-1.0.dll, \
                  install/shared/include/libusb-1.0/libusb.h, \
                  install/static/lib/libusb-1.0.a, \
                  install/static/include/libusb-1.0/libusb.h"
          fail: true
      - name: Test Shared
        if: always()
        working-directory: build/shared
        run: |
          export PATH="$(pwd)/../../install/shared/bin:$PATH"
          ctest --output-junit test_shared.xml ${{ env.COMMON_CTEST_ARGS }}
      - name: Test Static
        if: always()
        working-directory: build/static
        run: ctest --output-junit test_static.xml ${{ env.COMMON_CTEST_ARGS }}

  fedora-mingw-build:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install dependencies
        run: dnf install -y cmake git mingw32-gcc mingw64-gcc ninja-build
      - uses: actions/checkout@v6
        with:
          path: src
      - name: Configure
        run: |
          rm -rf build install
          mingw32-cmake -B build/shared_32 -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared_32 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
          mingw32-cmake -B build/static_32 -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static_32 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
          mingw64-cmake -B build/shared_64 -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared_64 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
          mingw64-cmake -B build/static_64 -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static_64 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
      - name: Build Shared x86
        working-directory: build/shared_32
        run: ninja install
      - name: Build Static x86
        working-directory: build/static_32
        run: ninja install
      - name: Build Shared x64
        working-directory: build/shared_64
        run: ninja install
      - name: Build Static x64
        working-directory: build/static_64
        run: ninja install
      - name: Check artifacts
        uses: andstor/file-existence-action@v3
        with:
          files: "install/shared_32/lib/libusb-1.0.dll.a, \
                  install/shared_32/bin/libusb-1.0.dll, \
                  install/shared_32/include/libusb-1.0/libusb.h, \
                  install/static_32/lib/libusb-1.0.a, \
                  install/static_32/include/libusb-1.0/libusb.h, \
                  install/shared_64/lib/libusb-1.0.dll.a, \
                  install/shared_64/bin/libusb-1.0.dll, \
                  install/shared_64/include/libusb-1.0/libusb.h, \
                  install/static_64/lib/libusb-1.0.a, \
                  install/static_64/include/libusb-1.0/libusb.h"
          fail: true
      - name: Test installed packages
        run: |
          for build_dir in build/shared_32 build/static_32 build/shared_64 build/static_64; do
            (cd "$build_dir" && ctest --no-tests=error --output-on-failure -R '^cmake_package$')
          done
          for prefix in install/shared_32 install/static_32 install/shared_64 install/static_64; do
            test -f "$prefix/lib/pkgconfig/libusb-1.0.pc"
          done
    # Cross-compiled Windows consumers are built but not run on the Linux host.

  windows-msvc-build:
    runs-on: windows-latest
    env:
      COMMON_CTEST_ARGS: --no-compress-output --output-on-failure

    steps:
    - uses: actions/checkout@v6
      with:
        path: src
    - name: Install dependencies
      run: choco install ninja
    - name: Set up MSVC
      uses: TheMrMilchmann/setup-msvc-dev@v4
      with:
        arch: x64
    - name: Configure Visual Studio
      run: |
        cmake -B build/msvc -S src -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/msvc -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
    - name: Configure NMake/Ninja
      shell: cmd
      run: |
        cmake -G"NMake Makefiles" -B build\nmake_shared -DCMAKE_INSTALL_PREFIX=install/nmake_shared -S src -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
        cmake -G"NMake Makefiles" -B build\nmake_static -DCMAKE_INSTALL_PREFIX=install/nmake_static -S src -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
        cmake -GNinja -B build\ninja_shared -DCMAKE_INSTALL_PREFIX=install/ninja_shared -S src -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
        cmake -GNinja -B build\ninja_static -DCMAKE_INSTALL_PREFIX=install/ninja_static -S src -DCMAKE_BUILD_TYPE=RelWithDebInfo -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
    - name: Build Visual Studio
      working-directory: build/msvc
      run: cmake --build . --config RelWithDebInfo --target install
    - name: Build NMake Shared
      working-directory: build/nmake_shared
      shell: cmd
      run: nmake install
    - name: Build NMake Static
      working-directory: build/nmake_static
      shell: cmd
      run: nmake install
    - name: Build Ninja Shared
      working-directory: build/ninja_shared
      shell: cmd
      run: ninja install
    - name: Build Ninja Static
      working-directory: build/ninja_static
      shell: cmd
      run: ninja install
    - name: Check artifacts
      uses: andstor/file-existence-action@v3
      with:
        files: "install/msvc/lib/usb-1.0.lib, \
                install/msvc/bin/libusb-1.0.dll, \
                install/msvc/include/libusb-1.0/libusb.h, \
                install/nmake_shared/lib/usb-1.0.lib, \
                install/nmake_shared/bin/libusb-1.0.dll, \
                install/nmake_shared/include/libusb-1.0/libusb.h, \
                install/nmake_static/lib/libusb-1.0.lib, \
                install/nmake_static/include/libusb-1.0/libusb.h, \
                install/ninja_shared/lib/usb-1.0.lib, \
                install/ninja_shared/bin/libusb-1.0.dll, \
                install/ninja_shared/include/libusb-1.0/libusb.h, \
                install/ninja_static/lib/libusb-1.0.lib, \
                install/ninja_static/include/libusb-1.0/libusb.h"
        fail: true
    - name: Test Visual Studio
      if: always()
      working-directory: build/msvc
      shell: cmd
      run: |
        set PATH=%PATH%;${{ github.workspace }}\install\msvc\bin
        ctest -C RelWithDebInfo --output-junit test_msvc.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Test NMake Shared
      if: always()
      working-directory: build/nmake_shared
      shell: cmd
      run: |
        set PATH=%PATH%;${{ github.workspace }}\install\nmake_shared\bin
        ctest --output-junit test_nmake_shared.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Test NMake Static
      if: always()
      working-directory: build/nmake_static
      run: ctest --output-junit test_nmake_static.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Test Ninja Shared
      if: always()
      working-directory: build/ninja_shared
      shell: cmd
      run: |
        set PATH=%PATH%;${{ github.workspace }}\install\ninja_shared\bin
        ctest --output-junit test_ninja_shared.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Test Ninja Static
      if: always()
      working-directory: build/ninja_static
      run: ctest --output-junit test_ninja_static.xml ${{ env.COMMON_CTEST_ARGS }}
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Test Results MSVC
        path: |
          build/msvc/test_msvc.xml
          build/nmake_shared/test_nmake_shared.xml
          build/nmake_static/test_nmake_static.xml
          build/ninja_shared/test_ninja_shared.xml
          build/ninja_static/test_ninja_static.xml

  android-build:
    runs-on: ubuntu-latest
    env:
      # ANDROID_NATIVE_API_LEVEL may be useful to set, but by default it is set to lowest supported by the NDK
      # and that is enough for the purpose of this script
      ANDROID_ARM32_CMAKE_OPTIONS: -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake -DANDROID_ABI=armeabi-v7a
      ANDROID_ARM64_CMAKE_OPTIONS: -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_ROOT}/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a

    steps:
    - uses: actions/checkout@v6
      with:
        path: src
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install ninja-build
    - name: Configure
      run: |
        rm -rf build install
        cmake -B build/shared_32 -S src -GNinja ${{ env.ANDROID_ARM32_CMAKE_OPTIONS }} -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared_32 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
        cmake -B build/static_32 -S src -GNinja ${{ env.ANDROID_ARM32_CMAKE_OPTIONS }} -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static_32 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
        cmake -B build/shared_64 -S src -GNinja ${{ env.ANDROID_ARM64_CMAKE_OPTIONS }} -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared_64 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
        cmake -B build/static_64 -S src -GNinja ${{ env.ANDROID_ARM64_CMAKE_OPTIONS }} -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static_64 -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
    - name: Build Shared ARM32
      working-directory: build/shared_32
      run: ninja install
    - name: Build Static ARM32
      working-directory: build/static_32
      run: ninja install
    - name: Build Shared ARM64
      working-directory: build/shared_64
      run: ninja install
    - name: Build Static ARM64
      working-directory: build/static_64
      run: ninja install
    - name: Check artifacts
      uses: andstor/file-existence-action@v3
      with:
        files: "install/shared_32/lib/libusb-1.0.so, \
                install/shared_32/include/libusb-1.0/libusb.h, \
                install/static_32/lib/libusb-1.0.a, \
                install/static_32/include/libusb-1.0/libusb.h, \
                install/shared_64/lib/libusb-1.0.so, \
                install/shared_64/include/libusb-1.0/libusb.h, \
                install/static_64/lib/libusb-1.0.a, \
                install/static_64/include/libusb-1.0/libusb.h"
        fail: true
    - name: Test installed packages
      run: |
        for build_dir in build/shared_32 build/static_32 build/shared_64 build/static_64; do
          (cd "$build_dir" && ctest --no-tests=error --output-on-failure -R '^cmake_package$')
        done
        for prefix in install/shared_32 install/static_32 install/shared_64 install/static_64; do
          test -f "$prefix/lib/pkgconfig/libusb-1.0.pc"
        done
    # Cross-compiled Android consumers are built but not run on the host.

  emscripten-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        path: src
    - name: Setup emsdk
      uses: emscripten-core/setup-emsdk@v16
    - name: Verify emsdk
      run: emcc -v
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install ninja-build pkg-config
    - name: Configure
      run: |
        rm -rf build install
        echo "EMSDK:" $EMSDK
        cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=OFF -DLIBUSB_BUILD_TESTING=OFF -DLIBUSB_BUILD_SHARED_LIBS=OFF -DCMAKE_TOOLCHAIN_FILE=$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake
    - name: Build Static
      working-directory: build/static
      run: ninja install
    - name: Check artifacts
      uses: andstor/file-existence-action@v3
      with:
        files: "install/static/lib/libusb-1.0.a, \
                install/static/include/libusb-1.0/libusb.h, \
                install/static/lib/cmake/libusb/libusb-config.cmake, \
                install/static/lib/cmake/libusb/libusb-config-version.cmake, \
                install/static/lib/cmake/libusb/libusb-targets.cmake, \
                install/static/lib/cmake/libusb/usb-1.0-targets.cmake, \
                install/static/lib/pkgconfig/libusb-1.0.pc"
        fail: true
    - name: Test installed package
      run: |
        cmake \
          -DTEST_BUILD_DIR="$PWD/build/static" \
          -DTEST_CMAKE_PACKAGE_DIR=lib/cmake/libusb \
          -DTEST_SOURCE_DIR="$PWD/src/tests/package" \
          -DTEST_ROOT="$PWD/build/package-test" \
          -DTEST_GENERATOR=Ninja \
          -DTEST_BUILD_TYPE=Release \
          -DTEST_CROSSCOMPILING=ON \
          -DTEST_CROSSCOMPILING_EMULATOR="$EMSDK_NODE" \
          -DTEST_CTEST_COMMAND="$(command -v ctest)" \
          -DTEST_TOOLCHAIN_FILE="$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake" \
          -P src/tests/package/run.cmake
    - name: Test pkg-config package
      run: |
        pc_dir="$PWD/install/static/lib/pkgconfig"
        PKG_CONFIG_LIBDIR="$pc_dir" pkg-config --validate libusb-1.0
        emcc -c src/tests/package/emscripten_runtime.c \
          $(PKG_CONFIG_LIBDIR="$pc_dir" pkg-config --cflags libusb-1.0) \
          -o build/pkgconfig-emscripten.o
        em++ build/pkgconfig-emscripten.o \
          $(PKG_CONFIG_LIBDIR="$pc_dir" pkg-config --libs --static libusb-1.0) \
          -o build/pkgconfig-emscripten.js
        timeout --kill-after=5s 30s "$EMSDK_NODE" build/pkgconfig-emscripten.js

  netbsd-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        path: src
    - uses: cross-platform-actions/action@v1
      with:
        operating_system: netbsd
        architecture: x86-64
        version: '10.1'
        run: |
          sudo pkgin update
          sudo pkgin -y install cmake ninja-build
          rm -rf build install
          cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
          cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
          ninja -C build/shared install
          ninja -C build/static install
    - name: Check artifacts
      uses: andstor/file-existence-action@v3
      with:
        files: "install/shared/lib/libusb-1.0.so, \
                install/shared/include/libusb-1.0/libusb.h, \
                install/static/lib/libusb-1.0.a, \
                install/static/include/libusb-1.0/libusb.h"
        fail: true

  omnios-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: src
      - uses: cross-platform-actions/action@v1
        with:
          operating_system: omnios
          architecture: x86-64
          version: 'r151056'
          run: |
            sudo pkg refresh
            sudo pkg install build-essential cmake header-ugen header-usb ninja
            rm -rf build install
            cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
            cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
            ninja -C build/shared install
            ninja -C build/static install
      - name: Check artifacts
        uses: andstor/file-existence-action@v3
        with:
          files: "install/shared/lib/libusb-1.0.so, \
                  install/shared/include/libusb-1.0/libusb.h, \
                  install/static/lib/libusb-1.0.a, \
                  install/static/include/libusb-1.0/libusb.h"
          fail: true

  openbsd-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: src
      - uses: cross-platform-actions/action@v1
        with:
          operating_system: openbsd
          architecture: x86-64
          version: '7.8'
          run: |
            sudo pkg_add -u
            sudo pkg_add cmake ninja
            rm -rf build install
            cmake -B build/shared -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/shared -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=ON
            cmake -B build/static -S src -GNinja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_INSTALL_PREFIX=install/static -DLIBUSB_BUILD_EXAMPLES=ON -DLIBUSB_BUILD_TESTING=ON -DLIBUSB_BUILD_SHARED_LIBS=OFF
            ninja -C build/shared install
            ninja -C build/static install
      - name: Check artifacts
        uses: andstor/file-existence-action@v3
        with:
          files: "install/shared/lib/libusb-1.0.so, \
                  install/shared/include/libusb-1.0/libusb.h, \
                  install/static/lib/libusb-1.0.a, \
                  install/static/include/libusb-1.0/libusb.h"
          fail: true

  event-file:
    name: "Event File"
    runs-on: ubuntu-latest

    steps:
    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: Event File
        path: ${{ github.event_path }}

  # Token-dispatched runs cannot rely on the workflow_run publisher chaining.
  publish-dispatched-test-results:
    name: "Publish Test Results (dispatched CI)"
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    needs:
      - ubuntu-build
      - macos-build
      - windows-mingw-build
      - windows-msvc-build
      - android-build
      - emscripten-build
      - netbsd-build
      - omnios-build
      - openbsd-build
      - event-file
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
      issues: read
      actions: read

    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        commit: ${{ github.sha }}
        event_file: artifacts/Event File/event.json
        event_name: ${{ github.event_name }}
        files: "artifacts/**/*.xml"
